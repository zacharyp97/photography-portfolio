name: Deploy Photography Portfolio to AWS S3

# This pipeline runs every time you push to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload to S3
    runs-on: ubuntu-latest   # GitHub runs this on a temporary Linux server

    steps:
      # Step 1: Check out your repo code onto the Linux server
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials using your GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3: Upload your website HTML/CSS files to S3
      - name: Upload website files to S3
        run: |
          aws s3 sync website/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "max-age=86400"

      # Step 4: Upload your photos folder to S3
      - name: Upload photos to S3
        run: |
          aws s3 sync photos/ s3://${{ secrets.S3_BUCKET_NAME }}/photos/ \
            --delete \
            --cache-control "max-age=2592000"

      # Step 5: Confirm what was uploaded
      - name: Confirm deployment
        run: |
          echo "Deployment complete!"
          echo "Website: http://${{ secrets.S3_BUCKET_NAME }}.s3-website-${{ secrets.AWS_REGION }}.amazonaws.com"